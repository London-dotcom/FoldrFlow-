<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FoldrFlow — Professional File Organization</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #F7F5F0; font-family: 'DM Sans', sans-serif; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    const tiers = [
      { id: "starter", name: "Starter", price: "$125", range: "0–100 files", tagline: "Perfect for small cleanups" },
      { id: "starter-plus", name: "Starter Plus", price: "$300", range: "101–300 files", tagline: "Ideal for growing folders" },
      { id: "professional", name: "Professional", price: "$650", range: "301–1,000 files", tagline: "Best for active businesses" },
      { id: "enterprise", name: "Enterprise", price: "$1,200", range: "1,001–3,000 files", tagline: "For large digital libraries" },
    ];

    function App() {
      const [selected, setSelected] = useState("starter");
      const [folderLink, setFolderLink] = useState("");
      const [notes, setNotes] = useState("");
      const [name, setName] = useState("");
      const [email, setEmail] = useState("");
      const [submitted, setSubmitted] = useState(false);

      const selectedTier = tiers.find(t => t.id === selected);

      const handleSubmit = () => {
        if (!folderLink || !name || !email) return;
        setSubmitted(true);
      };

      if (submitted) {
        return (
          <div style={{minHeight:"100vh",background:"#F7F5F0",display:"flex",alignItems:"center",justifyContent:"center",padding:"40px 16px"}}>
            <div style={{background:"#fff",borderRadius:16,padding:"60px 40px",maxWidth:500,width:"100%",textAlign:"center",boxShadow:"0 4px 32px rgba(0,0,0,0.07)"}}>
              <div style={{fontSize:40,color:"#2563EB",marginBottom:16}}>✦</div>
              <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:32,fontWeight:900,color:"#0F172A",marginBottom:12}}>Order Confirmed!</h2>
              <p style={{fontSize:16,color:"#334155",marginBottom:8}}>Thank you, <strong>{name}</strong>. We've received your <strong>{selectedTier.name}</strong> order.</p>
              <p style={{fontSize:14,color:"#64748B",lineHeight:1.6,marginBottom:24}}>A confirmation has been sent to <strong>{email}</strong>.<br/>You'll receive another email once your files are ready.</p>
              <div style={{display:"inline-block",background:"#EFF6FF",border:"1.5px solid #BFDBFE",borderRadius:8,padding:"8px 16px",fontSize:13,color:"#2563EB",fontWeight:500}}>
                {selectedTier.name} · {selectedTier.price} · {selectedTier.range}
              </div>
            </div>
          </div>
        );
      }

      return (
        <div style={{minHeight:"100vh",background:"#F7F5F0",padding:"48px 16px 80px",display:"flex",flexDirection:"column",alignItems:"center"}}>
          {/* Header */}
          <div style={{textAlign:"center",maxWidth:620,marginBottom:8}}>
            <div style={{fontSize:28,color:"#2563EB",marginBottom:4}}>✦</div>
            <h1 style={{fontFamily:"'Playfair Display',serif",fontSize:48,fontWeight:900,color:"#0F172A",margin:"0 0 12px",letterSpacing:"-1px"}}>FoldrFlow</h1>
            <p style={{fontSize:18,fontWeight:500,color:"#1E293B",margin:"0 0 10px"}}>Professional, human-powered file organization.</p>
            <p style={{fontSize:14,color:"#64748B",lineHeight:1.6,margin:"0 0 20px"}}>Share your folder link, tell us how you want things organized,<br/>and we'll handle the rest — no accounts required.</p>
            <div style={{display:"flex",justifyContent:"center",gap:24,flexWrap:"wrap"}}>
              {["All file types supported","Handled by a real person","Secure and private"].map(t => (
                <span key={t} style={{fontSize:13,color:"#334155",display:"flex",alignItems:"center",gap:6}}>
                  <span style={{color:"#16A34A",fontWeight:700}}>✓</span> {t}
                </span>
              ))}
            </div>
          </div>

          <div style={{width:"100%",maxWidth:700,height:1,background:"#E2E8F0",margin:"28px 0"}}/>

          {/* Card */}
          <div style={{background:"#fff",borderRadius:16,padding:"36px 40px",maxWidth:700,width:"100%",boxShadow:"0 4px 32px rgba(0,0,0,0.07)"}}>

            {/* Tiers */}
            <div style={{marginBottom:28}}>
              <label style={{display:"block",fontWeight:600,fontSize:14,color:"#0F172A",marginBottom:12}}>Select your organization plan:</label>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
                {tiers.map(tier => (
                  <div key={tier.id} onClick={() => setSelected(tier.id)}
                    style={{border: selected===tier.id ? "2px solid #2563EB" : "1.5px solid #E2E8F0", borderRadius:10, padding:"14px 12px", cursor:"pointer", background: selected===tier.id ? "#EFF6FF" : "#FAFAFA"}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                      <div style={{width:16,height:16,borderRadius:"50%",border: selected===tier.id ? "2px solid #2563EB" : "2px solid #CBD5E1",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                        {selected===tier.id && <div style={{width:8,height:8,borderRadius:"50%",background:"#2563EB"}}/>}
                      </div>
                      <span style={{fontSize:13,fontWeight:600,color:"#0F172A"}}>{tier.name}</span>
                    </div>
                    <div style={{fontSize:22,fontWeight:700,color:"#0F172A",marginBottom:8,fontFamily:"'Playfair Display',serif"}}>{tier.price}</div>
                    <div style={{height:1,background:"#E2E8F0",marginBottom:8}}/>
                    <div style={{fontSize:12,color:"#475569",marginBottom:4,fontWeight:500}}>{tier.range}</div>
                    <div style={{fontSize:11,color:"#94A3B8",fontStyle:"italic"}}>{tier.tagline}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* Folder Link */}
            <div style={{marginBottom:28}}>
              <label style={{display:"block",fontWeight:600,fontSize:14,color:"#0F172A",marginBottom:12}}>Paste your folder link:</label>
              <input style={{width:"100%",padding:"11px 14px",border:"1.5px solid #E2E8F0",borderRadius:8,fontSize:14,color:"#0F172A",background:"#FAFAFA",outline:"none",fontFamily:"'DM Sans',sans-serif"}}
                type="url" placeholder="Google Drive or Dropbox shared folder link"
                value={folderLink} onChange={e => setFolderLink(e.target.value)}/>
              <p style={{fontSize:12,color:"#94A3B8",marginTop:6}}>We'll organize directly in your cloud storage — your files never leave your drive.</p>
            </div>

            {/* Notes */}
            <div style={{marginBottom:28}}>
              <label style={{display:"block",fontWeight:600,fontSize:14,color:"#0F172A",marginBottom:12}}>Notes / Instructions:</label>
              <textarea style={{width:"100%",padding:"11px 14px",border:"1.5px solid #E2E8F0",borderRadius:8,fontSize:14,color:"#0F172A",background:"#FAFAFA",outline:"none",resize:"vertical",fontFamily:"'DM Sans',sans-serif"}}
                placeholder="Tell us how you'd like your files organized..." value={notes} onChange={e => setNotes(e.target.value)} rows={4}/>
              <p style={{fontSize:12,color:"#94A3B8",marginTop:6}}>Folder structure, naming preferences, any special instructions</p>
            </div>

            {/* Details */}
            <div style={{marginBottom:28}}>
              <label style={{display:"block",fontWeight:600,fontSize:14,color:"#0F172A",marginBottom:12}}>Your Details:</label>
              <div style={{display:"flex",gap:12}}>
                <input style={{flex:1,padding:"11px 14px",border:"1.5px solid #E2E8F0",borderRadius:8,fontSize:14,color:"#0F172A",background:"#FAFAFA",outline:"none",fontFamily:"'DM Sans',sans-serif"}}
                  type="text" placeholder="Full Name" value={name} onChange={e => setName(e.target.value)}/>
                <input style={{flex:1,padding:"11px 14px",border:"1.5px solid #E2E8F0",borderRadius:8,fontSize:14,color:"#0F172A",background:"#FAFAFA",outline:"none",fontFamily:"'DM Sans',sans-serif"}}
                  type="email" placeholder="Email Address" value={email} onChange={e => setEmail(e.target.value)}/>
              </div>
            </div>

            {/* Payment */}
            <div style={{marginBottom:28}}>
              <label style={{display:"block",fontWeight:600,fontSize:14,color:"#0F172A",marginBottom:12}}>Payment Information:</label>
              <div style={{display:"flex",gap:10,alignItems:"center",background:"#FAFAFA",border:"1.5px solid #E2E8F0",borderRadius:8,padding:"10px 14px"}}>
                <span style={{fontSize:18}}>💳</span>
                <input style={{flex:1,border:"none",background:"transparent",fontSize:14,color:"#94A3B8",outline:"none"}} placeholder="Card number" disabled/>
                <input style={{width:70,border:"none",background:"transparent",fontSize:14,color:"#94A3B8",outline:"none"}} placeholder="MM / YY" disabled/>
                <input style={{width:50,border:"none",background:"transparent",fontSize:14,color:"#94A3B8",outline:"none"}} placeholder="CVC" disabled/>
              </div>
              <p style={{fontSize:12,color:"#94A3B8",marginTop:6}}>Payment processing via Stripe (coming soon)</p>
            </div>

            {/* CTA */}
            <button onClick={handleSubmit}
              style={{width:"100%",padding:16,background:"#2563EB",color:"#fff",border:"none",borderRadius:10,fontSize:16,fontWeight:600,fontFamily:"'DM Sans',sans-serif",cursor: (!folderLink||!name||!email) ? "not-allowed":"pointer",opacity:(!folderLink||!name||!email)?0.5:1,marginBottom:12}}>
              Complete Order · {selectedTier.price}
            </button>
            <p style={{textAlign:"center",fontSize:13,color:"#94A3B8"}}>🔒 Secure checkout powered by <strong>Stripe</strong></p>
          </div>

          {/* Footer */}
          <div style={{marginTop:40,textAlign:"center",maxWidth:700,width:"100%"}}>
            <p style={{fontSize:12,color:"#94A3B8",marginBottom:8}}>© {new Date().getFullYear()} FoldrFlow. All rights reserved.</p>
            <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:10}}>
              <a href="#privacy" style={{fontSize:12,color:"#64748B",textDecoration:"none",borderBottom:"1px solid #CBD5E1"}}>Privacy Policy</a>
              <span style={{fontSize:12,color:"#CBD5E1"}}>·</span>
              <a href="#terms" style={{fontSize:12,color:"#64748B",textDecoration:"none",borderBottom:"1px solid #CBD5E1"}}>Terms of Use</a>
              <span style={{fontSize:12,color:"#CBD5E1"}}>·</span>
              <a href="#faq" style={{fontSize:12,color:"#64748B",textDecoration:"none",borderBottom:"1px solid #CBD5E1"}}>FAQ</a>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
